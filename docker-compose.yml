services:
  sigma-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5107
        - NEXTAUTH_URL=http://localhost:3000
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5107}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AZURE_AD_CLIENT_ID=${AZURE_AD_CLIENT_ID}
      - AZURE_AD_CLIENT_SECRET=${AZURE_AD_CLIENT_SECRET}
      - AZURE_AD_TENANT_ID=${AZURE_AD_TENANT_ID}
      - AZURE_AD_API_SCOPE=${AZURE_AD_API_SCOPE}
    restart: unless-stopped
    depends_on:
      sigma-api:
        condition: service_healthy
        optional: true

  sigma-api:
    image: sigma-api:latest
    build:
      context: ../SIGMA-Beta/SIGMA
      dockerfile: Dockerfile
    ports:
      - "5107:8080"
    environment:
      - AzureAd__TenantId=${AZURE_AD_TENANT_ID}
      - AzureAd__ClientId=${AZURE_AD_CLIENT_ID}
      - AzureAd__ClientSecret=${AZURE_AD_CLIENT_SECRET}
      - Entra__TenantId=${AZURE_AD_TENANT_ID}
      - Entra__ClientId=${AZURE_AD_CLIENT_ID}
      - Entra__ClientSecret=${AZURE_AD_CLIENT_SECRET}
      - Cors__AllowedOrigins__0=${SIGMA_WEB_ORIGIN:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    profiles:
      - full-stack
